<!DOCTYPE html>
<html>
<head>
    <title>Cropper</title>
    <style>
        body, html { margin: 0; padding: 0; background: #f0f0f0; overflow: hidden; }
        .container { display: flex; align-items: flex-start; }
        img { 
            display: block; 
            height: 600px; /* Fixed height for consistent vertical cropping */
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="leaders/grid.png" id="grid">
    </div>
</body>
</html>
